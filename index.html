<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ Sunglasses Try-On Studio</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
<style>
  body {
    font-family: -apple-system, sans-serif;
    background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
    background-size: 400% 400%;
    animation: gradient 15s ease infinite;
    min-height: 100vh;
  }
  @keyframes gradient {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  .glass {
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.3);
  }
  .gradient-text {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .btn-primary {
    background: linear-gradient(135deg, #667eea, #764ba2);
    transition: all 0.3s;
  }
  .btn-primary:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(102,126,234,0.4);
  }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .glasses-card {
    transition: all 0.3s;
    cursor: pointer;
  }
  .glasses-card:hover {
    transform: translateY(-4px) scale(1.05);
  }
  .glasses-card.selected {
    border-color: #667eea !important;
    box-shadow: 0 10px 30px rgba(102,126,234,0.4);
  }
  .upload-zone {
    border: 2px dashed #cbd5e0;
    transition: all 0.3s;
  }
  .upload-zone:hover {
    border-color: #667eea;
    background: rgba(102,126,234,0.05);
  }
</style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-6xl mx-auto">
  
  <div class="text-center mb-8">
    <h1 class="text-4xl md:text-6xl font-black gradient-text mb-3">
      ✨ Sunglasses Try-On
    </h1>
    <p class="text-white text-lg drop-shadow">
      Upload your photo and try on sunglasses instantly!
    </p>
  </div>

  <div class="glass rounded-3xl p-6 md:p-8 shadow-2xl mb-6">
    <h2 class="text-2xl font-bold mb-4">📸 Step 1: Upload Your Photo</h2>
    <label class="upload-zone rounded-2xl p-8 text-center block cursor-pointer">
      <div class="text-5xl mb-3">📷</div>
      <p class="font-semibold text-gray-700">Click to upload</p>
      <p class="text-sm text-gray-500 mt-1">Front-facing photo works best</p>
      <input type="file" id="personUpload" accept="image/*" class="hidden">
    </label>
    <div id="personPreview" class="mt-4 hidden">
      <img id="personImg" class="max-h-64 mx-auto rounded-2xl shadow-lg">
      <p id="faceShape" class="text-center mt-3 text-lg font-bold gradient-text"></p>
    </div>
  </div>

  <div id="glassesSection" class="glass rounded-3xl p-6 md:p-8 shadow-2xl mb-6 hidden">
    <h2 class="text-2xl font-bold mb-4">🕶️ Step 2: Choose Sunglasses</h2>
    
    <div class="flex gap-2 mb-6 border-b overflow-x-auto">
      <button onclick="switchTab('recommended')" id="tab-recommended" 
              class="px-4 py-2 font-semibold border-b-2 border-purple-600 text-purple-600 whitespace-nowrap">
        🤖 AI Recommended
      </button>
      <button onclick="switchTab('all')" id="tab-all" 
              class="px-4 py-2 font-semibold border-b-2 border-transparent text-gray-500 whitespace-nowrap">
        👓 All Styles
      </button>
      <button onclick="switchTab('upload')" id="tab-upload" 
              class="px-4 py-2 font-semibold border-b-2 border-transparent text-gray-500 whitespace-nowrap">
        📤 Upload Own
      </button>
    </div>

    <div id="glassesGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>

    <div id="uploadOwn" class="hidden">
      <label class="upload-zone rounded-2xl p-8 text-center block cursor-pointer">
        <div class="text-5xl mb-3">🕶️</div>
        <p class="font-semibold">Upload sunglasses image</p>
        <p class="text-sm text-gray-500 mt-1">PNG with transparent background works best</p>
        <input type="file" id="glassesUpload" accept="image/*" class="hidden">
      </label>
    </div>
  </div>

  <div id="resultSection" class="glass rounded-3xl p-6 md:p-8 shadow-2xl hidden">
    <h2 class="text-3xl font-bold mb-4 text-center gradient-text">🎉 Your Look!</h2>
    <canvas id="resultCanvas" class="max-w-full mx-auto rounded-2xl shadow-lg"></canvas>
    <div class="flex justify-center gap-3 mt-6 flex-wrap">
      <button onclick="downloadResult()" class="btn-primary text-white px-6 py-3 rounded-xl font-bold">
        💾 Download
      </button>
      <button onclick="resetAll()" class="bg-white border-2 border-gray-200 px-6 py-3 rounded-xl font-bold">
        🔄 Try Another
      </button>
    </div>
  </div>

  <div class="text-center text-white/80 text-sm mt-8 drop-shadow">
    Made with ❤️ using MediaPipe AI
  </div>
</div>

<script>
// SVG-based sunglasses - guaranteed to work!
function makeGlassesSVG(type, color = "#1a1a1a", lensColor = "#2a2a3e") {
  const svgs = {
    wayfarer: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 140"><path d="M20,40 L180,30 L200,50 L220,30 L380,40 L370,100 Q360,130 320,130 L240,130 Q210,130 200,100 Q190,130 160,130 L80,130 Q40,130 30,100 Z" fill="${color}"/><ellipse cx="115" cy="80" rx="75" ry="40" fill="${lensColor}" opacity="0.85"/><ellipse cx="285" cy="80" rx="75" ry="40" fill="${lensColor}" opacity="0.85"/></svg>`,
    aviator: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 140"><path d="M180,30 L220,30 M30,40 L180,30 M220,30 L370,40" stroke="${color}" stroke-width="4" fill="none"/><path d="M40,55 Q35,110 110,125 Q190,125 195,60 Q190,40 110,42 Q50,45 40,55 Z" fill="${color}"/><path d="M205,60 Q210,40 290,42 Q360,45 360,55 Q365,110 290,125 Q210,125 205,60 Z" fill="${color}"/><ellipse cx="115" cy="85" rx="70" ry="40" fill="${lensColor}" opacity="0.85"/><ellipse cx="285" cy="85" rx="70" ry="40" fill="${lensColor}" opacity="0.85"/></svg>`,
    round: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 140"><line x1="170" y1="70" x2="230" y2="70" stroke="${color}" stroke-width="5"/><circle cx="110" cy="70" r="60" fill="${color}"/><circle cx="290" cy="70" r="60" fill="${color}"/><circle cx="110" cy="70" r="50" fill="${lensColor}" opacity="0.85"/><circle cx="290" cy="70" r="50" fill="${lensColor}" opacity="0.85"/></svg>`,
    clubmaster: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 140"><path d="M20,40 Q15,55 30,60 L180,55 L200,75 L220,55 L370,60 Q385,55 380,40 L350,30 L220,35 L200,55 L180,35 L50,30 Z" fill="${color}"/><ellipse cx="115" cy="85" rx="75" ry="35" fill="${lensColor}" opacity="0.85" stroke="${color}" stroke-width="2"/><ellipse cx="285" cy="85" rx="75" ry="35" fill="${lensColor}" opacity="0.85" stroke="${color}" stroke-width="2"/></svg>`,
    sport: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 140"><path d="M20,50 Q15,90 50,115 L160,120 Q200,120 200,80 Q200,120 240,120 L350,115 Q385,90 380,50 Q380,30 350,30 L50,30 Q20,30 20,50 Z" fill="${color}"/><path d="M40,55 Q35,95 65,110 L160,112 Q190,112 190,80 Q190,50 160,48 L65,48 Q42,48 40,55 Z" fill="${lensColor}" opacity="0.9"/><path d="M210,80 Q210,50 240,48 L335,48 Q362,48 360,55 Q365,95 335,110 L240,112 Q210,112 210,80 Z" fill="${lensColor}" opacity="0.9"/></svg>`,
    cateye: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 140"><path d="M10,40 Q5,55 25,65 L60,75 Q60,120 130,120 Q200,120 195,75 L200,70 L205,75 Q200,120 270,120 Q340,120 340,75 L375,65 Q395,55 390,40 L355,35 Q310,45 280,50 L220,55 L200,65 L180,55 L120,50 Q90,45 45,35 Z" fill="${color}"/><path d="M65,75 Q65,110 130,110 Q190,110 185,75 Q180,55 130,55 Q75,58 65,75 Z" fill="${lensColor}" opacity="0.85"/><path d="M215,75 Q215,55 270,55 Q335,58 335,75 Q335,110 270,110 Q215,110 215,75 Z" fill="${lensColor}" opacity="0.85"/></svg>`,
    square: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 140"><path d="M20,30 L180,30 L200,50 L220,30 L380,30 L380,120 L220,120 L200,100 L180,120 L20,120 Z" fill="${color}"/><rect x="40" y="50" width="150" height="65" rx="6" fill="${lensColor}" opacity="0.85"/><rect x="210" y="50" width="150" height="65" rx="6" fill="${lensColor}" opacity="0.85"/></svg>`,
    oversized: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 140"><path d="M10,30 Q5,45 15,50 L180,40 L200,60 L220,40 L385,50 Q395,45 390,30 L355,20 L220,30 L200,50 L180,30 L45,20 Z" fill="${color}"/><ellipse cx="110" cy="80" rx="95" ry="50" fill="${color}"/><ellipse cx="290" cy="80" rx="95" ry="50" fill="${color}"/><ellipse cx="110" cy="80" rx="85" ry="42" fill="${lensColor}" opacity="0.85"/><ellipse cx="290" cy="80" rx="85" ry="42" fill="${lensColor}" opacity="0.85"/></svg>`
  };
  const svg = svgs[type] || svgs.wayfarer;
  return "data:image/svg+xml;base64," + btoa(svg);
}

const SUNGLASSES_CATALOG = [
  { id: 1, name: "Classic Wayfarer", type: "wayfarer", color: "#1a1a1a", lens: "#2a2a3e", goodFor: ["oval","round","heart"] },
  { id: 2, name: "Aviator Gold", type: "aviator", color: "#d4a854", lens: "#3a2e1a", goodFor: ["square","oval","heart"] },
  { id: 3, name: "Round Vintage", type: "round", color: "#3d2817", lens: "#4a3825", goodFor: ["square","oval"] },
  { id: 4, name: "Clubmaster", type: "clubmaster", color: "#1a1a1a", lens: "#2a2a3e", goodFor: ["oval","round","heart"] },
  { id: 5, name: "Sports Black", type: "sport", color: "#0a0a0a", lens: "#1a3a5a", goodFor: ["oval","round","square"] },
  { id: 6, name: "Cat Eye", type: "cateye", color: "#8b2929", lens: "#2a1a1a", goodFor: ["round","oval","square"] },
  { id: 7, name: "Square Modern", type: "square", color: "#1a1a1a", lens: "#1a2a3e", goodFor: ["round","oval","heart"] },
  { id: 8, name: "Oversized Chic", type: "oversized", color: "#2a1a3a", lens: "#1a1a2a", goodFor: ["heart","oval","square"] },
  { id: 9, name: "Tortoise Wayfarer", type: "wayfarer", color: "#6b4423", lens: "#3a2818", goodFor: ["oval","round","heart"] },
  { id: 10, name: "Silver Aviator", type: "aviator", color: "#a8a8b0", lens: "#1a2a3e", goodFor: ["square","oval","heart"] },
  { id: 11, name: "Blue Lens Round", type: "round", color: "#1a1a1a", lens: "#1a4a8a", goodFor: ["square","oval"] },
  { id: 12, name: "Red Cat Eye", type: "cateye", color: "#c41e3a", lens: "#2a1a1a", goodFor: ["round","oval","square"] },
];

// Pre-generate all glasses images
SUNGLASSES_CATALOG.forEach(g => g.img = makeGlassesSVG(g.type, g.color, g.lens));

let personImageData = null;
let selectedGlasses = null;
let detectedFaceShape = "oval";
let faceLandmarks = null;
let currentTab = "recommended";

function detectFaceShape(landmarks, w, h) {
  const top = landmarks[10], bottom = landmarks[152];
  const left = landmarks[234], right = landmarks[454];
  const jawLeft = landmarks[172], jawRight = landmarks[397];
  
  const faceHeight = (bottom.y - top.y) * h;
  const faceWidth = (right.x - left.x) * w;
  const jawWidth = (jawRight.x - jawLeft.x) * w;
  
  const ratio = faceHeight / faceWidth;
  const jawRatio = jawWidth / faceWidth;
  
  if (ratio > 1.5) return "oblong";
  if (ratio < 1.1 && jawRatio > 0.85) return "round";
  if (ratio < 1.2 && jawRatio > 0.9) return "square";
  if (jawRatio < 0.7) return "heart";
  return "oval";
}

function getShapeAdvice(shape) {
  return {
    oval: "Lucky you! Almost any style works.",
    round: "Try angular frames like Wayfarer or Square.",
    square: "Soften features with Round or Aviator.",
    heart: "Bottom-heavy frames balance your face.",
    oblong: "Oversized or tall frames work best.",
  }[shape];
}

document.getElementById('personUpload').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (event) => {
    personImageData = event.target.result;
    document.getElementById('personImg').src = personImageData;
    document.getElementById('personPreview').classList.remove('hidden');
    document.getElementById('faceShape').textContent = "🔍 Analyzing your face...";
    await analyzeFace();
    document.getElementById('glassesSection').classList.remove('hidden');
    renderGlasses();
  };
  reader.readAsDataURL(file);
});

async function analyzeFace() {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = async () => {
      try {
        const faceMesh = new FaceMesh({
          locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
        });
        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true });
        faceMesh.onResults((results) => {
          if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
            faceLandmarks = results.multiFaceLandmarks[0];
            detectedFaceShape = detectFaceShape(faceLandmarks, img.width, img.height);
            document.getElementById('faceShape').innerHTML = 
              `Face Shape: <span class="capitalize">${detectedFaceShape}</span> — ${getShapeAdvice(detectedFaceShape)}`;
          } else {
            document.getElementById('faceShape').textContent = "⚠️ No face detected. Try a clearer photo.";
          }
          resolve();
        });
        await faceMesh.send({ image: img });
      } catch (err) {
        document.getElementById('faceShape').textContent = "Face detection unavailable. You can still try glasses!";
        resolve();
      }
    };
    img.src = personImageData;
  });
}

function switchTab(tab) {
  currentTab = tab;
  ['recommended','all','upload'].forEach(t => {
    const el = document.getElementById(`tab-${t}`);
    if (t === tab) {
      el.classList.add('border-purple-600','text-purple-600');
      el.classList.remove('border-transparent','text-gray-500');
    } else {
      el.classList.remove('border-purple-600','text-purple-600');
      el.classList.add('border-transparent','text-gray-500');
    }
  });
  if (tab === 'upload') {
    document.getElementById('glassesGrid').classList.add('hidden');
    document.getElementById('uploadOwn').classList.remove('hidden');
  } else {
    document.getElementById('glassesGrid').classList.remove('hidden');
    document.getElementById('uploadOwn').classList.add('hidden');
    renderGlasses();
  }
}

function renderGlasses() {
  const grid = document.getElementById('glassesGrid');
  let list = SUNGLASSES_CATALOG;
  if (currentTab === 'recommended') {
    list = SUNGLASSES_CATALOG.filter(g => g.goodFor.includes(detectedFaceShape));
    if (list.length === 0) list = SUNGLASSES_CATALOG;
  }
  grid.innerHTML = list.map(g => `
    <div class="glasses-card bg-white rounded-2xl p-4 border-2 border-transparent shadow-md" 
         onclick="selectGlasses(${g.id})" id="card-${g.id}">
      <div class="bg-gray-50 rounded-lg p-2 mb-2">
        <img src="${g.img}" alt="${g.name}" class="w-full h-20 object-contain">
      </div>
      <p class="text-center text-sm font-semibold">${g.name}</p>
      ${g.goodFor.includes(detectedFaceShape) ? 
        '<p class="text-center text-xs text-green-600 mt-1">✓ Perfect for you</p>' : ''}
    </div>
  `).join('');
}

document.getElementById('glassesUpload').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (event) => {
    selectedGlasses = { img: event.target.result, name: "Custom" };
    applyGlasses();
  };
  reader.readAsDataURL(file);
});

function selectGlasses(id) {
  const g = SUNGLASSES_CATALOG.find(x => x.id === id);
  selectedGlasses = g;
  document.querySelectorAll('.glasses-card').forEach(c => c.classList.remove('selected'));
  document.getElementById(`card-${id}`).classList.add('selected');
  applyGlasses();
}

async function applyGlasses() {
  if (!personImageData || !selectedGlasses) {
    alert("Please upload a photo first!");
    return;
  }
  if (!faceLandmarks) {
    alert("Face not detected. Please upload a clearer front-facing photo.");
    return;
  }
  
  const canvas = document.getElementById('resultCanvas');
  const ctx = canvas.getContext('2d');
  const person = new Image();
  person.onload = () => {
    canvas.width = person.naturalWidth;
    canvas.height = person.naturalHeight;
    ctx.drawImage(person, 0, 0);
    
    const leftEye = faceLandmarks[33];
    const rightEye = faceLandmarks[263];
    const x1 = leftEye.x * canvas.width;
    const y1 = leftEye.y * canvas.height;
    const x2 = rightEye.x * canvas.width;
    const y2 = rightEye.y * canvas.height;
    
    const eyeWidth = Math.hypot(x2 - x1, y2 - y1);
    const angle = Math.atan2(y2 - y1, x2 - x1);
    
    const glasses = new Image();
    glasses.onload = () => {
      const gWidth = eyeWidth * 2.3;
      const gHeight = (glasses.naturalHeight / glasses.naturalWidth) * gWidth;
      const cx = (x1 + x2) / 2;
      const cy = (y1 + y2) / 2;
      
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(angle);
      ctx.drawImage(glasses, -gWidth / 2, -gHeight / 2, gWidth, gHeight);
      ctx.restore();
      
      document.getElementById('resultSection').classList.remove('hidden');
      document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
    };
    glasses.onerror = () => alert("Couldn't load glasses image.");
    glasses.src = selectedGlasses.img;
  };
  person.src = personImageData;
}

function downloadResult() {
  const canvas = document.getElementById('resultCanvas');
  const link = document.createElement('a');
  link.download = 'tryon-result.png';
  link.href = canvas.toDataURL();
  link.click();
}

function resetAll() {
  personImageData = null;
  selectedGlasses = null;
  faceLandmarks = null;
  document.getElementById('personPreview').classList.add('hidden');
  document.getElementById('glassesSection').classList.add('hidden');
  document.getElementById('resultSection').classList.add('hidden');
  document.getElementById('personUpload').value = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>

</body>
  </html>
